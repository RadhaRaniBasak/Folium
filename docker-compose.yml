version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: folium-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    env_file:
      - .env

  redis:
    image: redis:alpine
    container_name: folium-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
